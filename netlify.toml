[build]
  command = "npm run build"
  publish = ".next"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000
  host = "0.0.0.0"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."meeting-notes"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-nextjs"
