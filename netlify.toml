[build]
  command = "npm run build"
  publish = ".next"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000
  host = "0.0.0.0"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # 함수 최대 실행 시간: 26초 (Netlify 무료 플랜 기본)
  # 긴 회의 지원 시 Background Functions로 전환 필요

[[plugins]]
  package = "@netlify/plugin-nextjs"
